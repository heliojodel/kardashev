apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
      - name: consumer
        image: your-registry/consumer:latest
        args: ["/configs/{{ .Values.streamName }}.json"]
        env:
        - name: KAFKA_BROKER
          value: "kafka-service:9092"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secrets
              key: secret-key
        volumeMounts:
        - name: config-volume
          mountPath: /configs
      volumes:
      - name: config-volume
        configMap:
          name: stream-configs
